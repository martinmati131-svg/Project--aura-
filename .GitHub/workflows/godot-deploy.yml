name: "Godot Web Deploy"
on:
  push:
    branches:
      - main

jobs:
  export_web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1 # Matches Godot 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Web Export
        run: |
          mkdir -v -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web # The folder the game is in
          branch: gh-pages # Separate branch for hosting
