<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Robot Control Panel</title>
    <style>
        /* This is the CSS (the "Skin") */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Changed to flex-start */
            height: 100vh;
            margin: 0;
            padding-top: 50px; /* Added padding */
            color: #333;
        }
        .container {
            width: 400px;
            padding: 30px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        /* New container for the RSS feed */
        #news-container {
            margin-left: 30px;
            height: 450px; /* Fixed height for scrolling */
            overflow-y: auto; /* Add scrollbar if content overflows */
        }
        #news-container h2 {
            text-align: left;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        .news-item {
            text-align: left;
            margin-bottom: 15px;
        }
        .news-item a {
            text-decoration: none;
            color: #0056b3;
            font-weight: 600;
            font-size: 1.1em;
        }
        .news-item a:hover {
            text-decoration: underline;
        }
        .news-item p {
            font-size: 0.9em;
            color: #555;
            margin: 5px 0 0 0;
        }

        /* --- Brain Status Styles --- */
        h1 {
            margin-top: 0;
            color: #1a1a1a;
        }
        #status-display {
            font-size: 2.5em;
            font-weight: bold;
            padding: 40px;
            border-radius: 12px;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .focused {
            background-color: #e6f7ff;
            color: #0056b3;
            border: 2px solid #b3e0ff;
        }
        .distracted {
            background-color: #fff0f0;
            color: #d90000;
            border: 2px solid #ffb3b3;
        }
        .initializing {
            background-color: #f5f5f5;
            color: #888;
            border: 2px solid #ddd;
        }
    </style>
</head>
<body>
    <div id="brain-container" class="container">
        <h1>🧠 Aura Brain Status</h1>
        <div id="status-display" class="initializing">
            INITIALIZING...
        </div>
        <p>Confidence: <span id="confidence">--</span>%</p>
    </div>

    <div id="news-container" class="container">
        <h2>📰 Aura News Feed</h2>
        <div id="rss-content">Loading feed...</div>
    </div>

    <script>
        // --- Get Aura Status ---
        const statusElement = document.getElementById("status-display");
        const confidenceElement = document.getElementById("confidence");

        async function getAuraStatus() {
            try {
                const response = await fetch("http://127.0.0.1:5000/api/v1/aura/status");
                const data = await response.json();
                const state = data.prediction || 'initializing';
                const confidence = (data.confidence * 100).toFixed(1);

                statusElement.textContent = state.toUpperCase();
                confidenceElement.textContent = confidence;
                statusElement.className = "status-display " + state;

            } catch (error) {
                console.error("Could not connect to Aura brain:", error);
                statusElement.textContent = "DISCONNECTED";
                statusElement.className = "status-display distracted";
                confidenceElement.textContent = "??";
            }
        }

        // --- NEW: Get RSS Feed ---
        const rssContentElement = document.getElementById("rss-content");
        
        // We'll use a tech news feed. We must use a proxy to avoid security errors.
        const RSS_FEED_URL = "https://feeds.arstechnica.com/arstechnica/index";
        const CORS_PROXY_URL = "https://api.allorigins.win/raw?url=";

        async function getRssFeed() {
            try {
                const response = await fetch(CORS_PROXY_URL + encodeURIComponent(RSS_FEED_URL));
                const str = await response.text();
                const data = new window.DOMParser().parseFromString(str, "text/xml");

                let html = "";
                const items = data.querySelectorAll("item");

                // Loop through the first 5 news items
                for (let i = 0; i < 5; i++) {
                    const item = items[i];
                    if (!item) continue;

                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    // Get a short description, strip HTML tags from it
                    const description = item.querySelector("description").textContent
                                        .replace(/<[^>]+>/g, '') 
                                        .substring(0, 100) + "..."; 

                    html += `
                        <div class="news-item">
                            <a href="${link}" target="_blank">${title}</a>
                            <p>${description}</p>
                        </div>
                    `;
                }

                rssContentElement.innerHTML = html;

            } catch (error) {
                console.error("Could not fetch RSS feed:", error);
                rssContentElement.innerHTML = "Error loading news feed.";
            }
        }

        // --- Run everything ---
        
        // Check brain status every 3 seconds
        setInterval(getAuraStatus, 3000);
        
        // Check brain status immediately on page load
        getAuraStatus();
        
        // Get the news feed on page load
        getRssFeed();
    </script>
</body>
</html>
