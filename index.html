
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Platform Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>🧠 Aura</h2>
            </div>
            <ul class="sidebar-nav">
                <li class="active"><a href="#">Dashboard</a></li>
                <li><a href="#">Focus Shield</a></li>
                <li><a href="#">Digital Twin</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="main-header">
                <h1>Welcome Back</h1>
            </header>

            <div class="card" id="brain-status-card">
                <h3>Aura Brain Status</h3>
                <div id="status-display" class="initializing">
                    INITIALIZING...
                </div>
                <p>Confidence: <span id="confidence">--</span>%</p>
            </div>

            <div class="card" id="news-card">
                <h3>📰 News Feed</h3>
                <div id="rss-content">Loading feed...</div>
            </div>

        </main>

    </div>

    <script src="dashboard.js"></script>
</body>
</html>
